[General]
# 日志级别
loglevel = notify

# 显示错误页
show-error-page = true
show-error-page-for-reject = true

# Wi-Fi助理
wifi-assist = true

# All Hybrid 网络并发
all-hybrid = false

# ipv6 支持
ipv6 = true
ipv6-vif = auto

# 测速
test-timeout = 2
internet-test-url = http://wifi.vivo.com.cn/generate_204
proxy-test-url = http://1.1.1.1/generate_204
proxy-test-udp = www.apple.com@64.6.64.6

# GeoIP
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
disable-geoip-db-auto-update = false

# 排除简单主机名
exclude-simple-hostnames = true

# DNS
dns-server = 223.5.5.5, 114.114.114.114, system #!IOS-ONLY
dns-server = 223.5.5.5, 114.114.114.114 #!MACOS-ONLY
encrypted-dns-skip-cert-verification = false

# 加密DNS
encrypted-dns-follow-outbound-mode = false
hijack-dns = *:53

# Hijack DNS
read-etc-hosts = true

# 从 hosts 读取 DNS 记录
allow-wifi-access = true

# 当 Wi-Fi 不是首选网络时 SSID 组策略使用默认策略
wifi-access-http-port = 6152

# 热点分享代理
wifi-access-socks5-port = 6153

# --- Wi-Fi ACCESS ---
# Surge 可以作为一个标准的 HTTP/SOCKS5 代理服务器向 wi-Fi 网络下的其他设备提供服务器
# 外网访问
external-controller-access = 111111@0.0.0.0:6170
http-api = 111111@0.0.0.0:6171
http-api-web-dashboard = true
http-api-tls = true
compatibility-mode = 1

# 远程控制器
hide-vpn-icon = false
include-all-networks = false

# 开启该选项后可以通过浏览器控制 Surge：127.0.0.1:6171
include-local-networks = false

# 使用 HTTPS 替代 HTTP 协议  开启后无法通过浏览器控制 Surge
udp-policy-not-supported-behaviour = REJECT

# 兼容模式
use-local-host-item-for-proxy = false

# 隐藏VPN图标
include-apns = false

# 包含所有的网络请求
udp-priority = true

# 包含本地网络请求
include-cellular-services = false

# 当节点不支持UDP时，默认fallback 到reject
subnet-exp-wifi-always-match = false

# TCP Fast Open Behaviour
# tfo-behaviour = auto
socks5-listen = 0.0.0.0

[Ponte]
server-proxy-name= 𝘿𝙄𝙍𝙀𝘾𝙏

[Proxy]
𝘿𝙄𝙍𝙀𝘾𝙏 = direct
𝙍𝙀𝙅𝙀𝘾𝙏 = reject

